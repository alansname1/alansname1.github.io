<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Free online typing speed test with WPM, accuracy tracking, typing practice, and keyboard skill improvement tools." />
<title>Free Typing Speed Test | Check Your WPM & Accuracy Online</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
.test-box {
  border: 1px solid #ccc;
  padding: 20px;
  border-radius: 10px;
}
#passage {
  margin-bottom: 15px;
  font-size: 18px;
}
textarea {
  width: 100%;
  height: 120px;
}
.stats {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Free Typing Speed Test</h1>

<p>Start typing below to test your speed and accuracy.</p>

<div id="typing-test" class="test-box">

<select id="duration">
<option value="60">1 Minute</option>
<option value="300">5 Minutes</option>
<option value="600">10 Minutes</option>
</select>

<button onclick="startTest()">Start</button>
<button onclick="resetTest()">Reset</button>

<div id="passage"></div>

<textarea id="input" disabled></textarea>

<div class="stats">
Time: <span id="time">60</span><br>
WPM: <span id="wpm">0</span><br>
Accuracy: <span id="accuracy">100</span>%
</div>

</div>

<script>
const text = "Typing every day helps improve speed and accuracy.";

let timer;
let timeLeft;
let started = false;

function startTest() {
  if (started) return;

  started = true;
  timeLeft = document.getElementById("duration").value;

  document.getElementById("input").disabled = false;
  document.getElementById("input").focus();
  document.getElementById("passage").innerText = text;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById("input").disabled = true;
    }
  }, 1000);
}

function resetTest() {
  clearInterval(timer);
  started = false;

  document.getElementById("input").value = "";
  document.getElementById("input").disabled = true;

  document.getElementById("time").innerText = 60;
  document.getElementById("wpm").innerText = 0;
  document.getElementById("accuracy").innerText = 100;
  document.getElementById("passage").innerText = "";
}
</script>

</body>
</html>
