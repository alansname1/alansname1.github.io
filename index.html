<h1>Free Typing Speed Test – Check Your WPM & Accuracy Online</h1>

<p>Start typing below to test your speed and accuracy.</p>

<div id="typing-test" class="test-box">
  <div class="controls">
    <select id="duration">
      <option value="60">1 Minute</option>
      <option value="300">5 Minutes</option>
      <option value="600">10 Minutes</option>
    </select>

    <button class="primary-btn" onclick="startTest()">Start Test</button>
    <button class="secondary-btn" onclick="resetTest()">Reset</button>
  </div>

  <div id="passage"></div>
  <textarea id="typingInput" disabled></textarea>

  <div class="stats">
    <div>Time Left: <span id="timeLeft">60</span></div>
    <div>WPM: <span id="wpm">0</span></div>
    <div>Accuracy: <span id="accuracy">100</span>%</div>
  </div>
</div>

<script>
const passages = [
  "Typing every day helps improve speed and accuracy.",
  "Practice regularly to become faster and more accurate.",
  "Typing skills are useful for jobs and daily tasks."
];

let current = "";
let timeLeft = 60;
let timer;

function startTest() {
  current = passages[Math.floor(Math.random() * passages.length)];
  document.getElementById("passage").innerText = current;
  document.getElementById("typingInput").disabled = false;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timeLeft").innerText = timeLeft;
    if (timeLeft <= 0) clearInterval(timer);
  }, 1000);
}

function resetTest() {
  clearInterval(timer);
  timeLeft = 60;
  document.getElementById("timeLeft").innerText = timeLeft;
  document.getElementById("typingInput").value = "";
}
</script>
