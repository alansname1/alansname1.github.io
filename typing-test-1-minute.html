<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1 Minute Typing Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    button { padding: 12px 20px; font-size: 16px; margin-right: 10px; }
    textarea { width: 100%; min-height: 140px; margin-top: 15px; padding: 12px; font-size: 16px; }
    #sampleText { margin: 20px 0; font-size: 18px; }
    #status { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

<h1>1 Minute Typing Test</h1>

<div id="sampleText">Click Start Test</div>

<button onclick="startTest()">Start Test</button>
<button onclick="restartTest()">Restart</button>

<textarea id="inputBox" disabled placeholder="Type here..."></textarea>

<div id="status">Waiting</div>

<script>
function startTest() {
  document.getElementById("sampleText").textContent = "Typing every day helps improve speed and accuracy over time.";
  document.getElementById("inputBox").disabled = false;
  document.getElementById("inputBox").value = "";
  document.getElementById("inputBox").focus();
  document.getElementById("status").textContent = "Start button worked";
}

function restartTest() {
  document.getElementById("sampleText").textContent = "Click Start Test";
  document.getElementById("inputBox").value = "";
  document.getElementById("inputBox").disabled = true;
  document.getElementById("status").textContent = "Restart button worked";
}
</script>

</body>
</html>
