<script>
const passages = [
  "Typing every day helps improve speed and accuracy over time.",
  "Short typing practice sessions can build confidence and stronger keyboard skills.",
  "A one minute typing test is a quick way to check your typing speed and accuracy.",
  "Daily typing practice helps many people become faster and more comfortable on the keyboard.",
  "Improving typing speed usually starts with careful practice and fewer typing mistakes.",
  "Typing tests can help students, job seekers, and office workers measure their progress.",
  "Consistent typing practice helps build rhythm, control, and confidence with common words."
];

let current = "";
let currentIndex = -1;
let timeLeft = 60;
let timer = null;
const duration = 60;

function pickPassage() {
  let newIndex = Math.floor(Math.random() * passages.length);
  if (passages.length > 1) {
    while (newIndex === currentIndex) {
      newIndex = Math.floor(Math.random() * passages.length);
    }
  }
  currentIndex = newIndex;
  current = passages[newIndex];
  document.getElementById("passage").innerText = current;
}

function startTest() {
  clearInterval(timer);
  timeLeft = duration;
  document.getElementById("timeLeft").innerText = timeLeft;
  document.getElementById("typingInput").disabled = false;
  document.getElementById("typingInput").focus();
  document.getElementById("typingInput").value = "";
  pickPassage();
  updateStats();

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timeLeft").innerText = timeLeft;
    updateStats();

    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById("typingInput").disabled = true;
    }
  }, 1000);
}

function resetTest() {
  clearInterval(timer);
  timeLeft = duration;
  document.getElementById("timeLeft").innerText = timeLeft;
  document.getElementById("typingInput").value = "";
  document.getElementById("typingInput").disabled = true;
  document.getElementById("wpm").innerText = "0";
  document.getElementById("accuracy").innerText = "100";
  pickPassage();
}

function updateStats() {
  const inputEl = document.getElementById("typingInput");
  const typed = inputEl.value;

  let correct = 0;
  for (let i = 0; i < typed.length; i++) {
    if (typed[i] === current[i]) correct++;
  }

  const elapsed = (duration - timeLeft) / 60;
  const wpm = elapsed > 0 ? Math.round((correct / 5) / elapsed) : 0;
  const accuracy = typed.length > 0 ? Math.round((correct / typed.length) * 100) : 100;

  document.getElementById("wpm").innerText = wpm;
  document.getElementById("accuracy").innerText = accuracy;

  // 🔥 KEY FIX: load new text automatically when finished
  if (typed === current) {
    inputEl.value = "";
    pickPassage();
  }
}

document.getElementById("typingInput").addEventListener("input", updateStats);

resetTest();
</script>
