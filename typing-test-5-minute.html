<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Take a free 5 minute typing test online. Improve typing speed, accuracy, and endurance with a longer typing challenge." />
  <title>5 Minute Typing Test | Free WPM Speed Test</title>
  <link rel="canonical" href="https://alansname1.github.io/typing-test-5-minute.html" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 950px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1, h2 {
      text-align: center;
      color: #1d3557;
    }

    .typing-box {
      margin-top: 25px;
      padding: 20px;
      border: 2px solid #d9e2ec;
      border-radius: 10px;
      background: #f9fbfd;
    }

    #sampleText {
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 20px;
      min-height: 110px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      font-size: 1rem;
      padding: 15px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
    }

    textarea:disabled {
      background: #eef2f7;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      background: #1d4ed8;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 25px;
      text-align: center;
    }

    .stat-card {
      background: #eff6ff;
      padding: 18px;
      border-radius: 10px;
    }

    .correct { color: green; }
    .incorrect { color: red; text-decoration: underline; }
    .current { background: yellow; }
  </style>
</head>

<body>

<div class="container">
  <h1>5 Minute Typing Test</h1>

  <div class="typing-box">
    <div id="sampleText">Click Start Test to begin.</div>

    <textarea id="inputBox" disabled></textarea>

    <div class="controls">
      <button id="startBtn">Start Test</button>
      <button id="restartBtn">Restart</button>
    </div>

    <div class="stats">
      <div class="stat-card">Time <strong id="time">300</strong></div>
      <div class="stat-card">WPM <strong id="wpm">0</strong></div>
      <div class="stat-card">Accuracy <strong id="accuracy">100%</strong></div>
      <div class="stat-card">Chars <strong id="chars">0</strong></div>
      <div class="stat-card">Best <strong id="bestWpm">0</strong></div>
    </div>

    <div id="message"></div>
  </div>
</div>

<script>
const passages = [
  "Typing every day helps improve speed and accuracy over time.",
  "Short typing practice sessions can build confidence and stronger keyboard skills.",
  "Typing with accuracy first often leads to better speed.",
  "Consistent typing practice helps build rhythm and control.",
  "Better typing skills can improve productivity every day.",
  "Regular practice can improve typing speed naturally."
];

const sampleText = document.getElementById("sampleText");
const inputBox = document.getElementById("inputBox");
const timeDisplay = document.getElementById("time");
const wpmDisplay = document.getElementById("wpm");
const accuracyDisplay = document.getElementById("accuracy");
const charsDisplay = document.getElementById("chars");
const bestWpmDisplay = document.getElementById("bestWpm");

let currentText = "";
let timeLeft = 300;
let timer = null;
let started = false;

let totalTypedChars = 0;
let totalCorrectChars = 0;
let totalTypedWords = 0;

const KEY = "bestWpm5";

function showStartState() {
  inputBox.disabled = true;
  inputBox.value = "";
  sampleText.textContent = "Click Start Test to begin.";
}

function getRandomPassage() {
  return passages[Math.floor(Math.random() * passages.length)];
}

function renderText(input) {
  let html = "";
  for (let i = 0; i < currentText.length; i++) {
    let cls = "";
    if (i < input.length) {
      cls = input[i] === currentText[i] ? "correct" : "incorrect";
    } else if (i === input.length) {
      cls = "current";
    }
    html += `<span class="${cls}">${currentText[i]}</span>`;
  }
  sampleText.innerHTML = html;
}

function loadNewPassage() {
  currentText = getRandomPassage();
  inputBox.value = "";
  renderText("");
}

function countWords(t) {
  return t.trim() ? t.trim().split(/\s+/).length : 0;
}

function updateStats() {
  const input = inputBox.value;
  const elapsed = 300 - timeLeft;

  let correct = 0;
  for (let i = 0; i < input.length; i++) {
    if (input[i] === currentText[i]) correct++;
  }

  const words = totalTypedWords + countWords(input);
  const wpm = elapsed ? Math.round((words / elapsed) * 60) : 0;

  wpmDisplay.textContent = wpm;
  accuracyDisplay.textContent = Math.round((correct / input.length || 1) * 100) + "%";
  charsDisplay.textContent = totalTypedChars + input.length;

  renderText(input);
}

function completePassage() {
  const typed = inputBox.value;
  totalTypedChars += typed.length;
  totalTypedWords += countWords(typed);
  loadNewPassage();
}

function startTest() {
  timeLeft = 300;
  started = true;
  inputBox.disabled = false;
  loadNewPassage();

  timer = setInterval(() => {
    timeLeft--;
    timeDisplay.textContent = timeLeft;
    if (timeLeft <= 0) endTest();
  }, 1000);
}

function endTest() {
  clearInterval(timer);
  inputBox.disabled = true;

  const finalWpm = Math.round(totalTypedWords / 5);
  wpmDisplay.textContent = finalWpm;

  const best = Math.max(finalWpm, localStorage.getItem(KEY) || 0);
  localStorage.setItem(KEY, best);
  bestWpmDisplay.textContent = best;
}

inputBox.addEventListener("input", () => {
  if (!started) return;
  updateStats();
  if (inputBox.value.trim() === currentText) completePassage();
});

document.getElementById("startBtn").onclick = startTest;
document.getElementById("restartBtn").onclick = showStartState;

bestWpmDisplay.textContent = localStorage.getItem(KEY) || 0;
showStartState();
</script>

</body>
</html>
